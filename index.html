<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markfish8672</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f5f5f7;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .page {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* 頭像 */
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin-bottom: 4px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.25);
    }

    /* 名字 */
    .name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.3px;
    }

    /* 簡介 */
    .bio {
      font-size: 0.92rem;
      color: #666;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 8px;
      max-width: 280px;
    }

    /* 連結卡片 */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      border: 1px solid #e5e5ea;
      border-radius: 14px;
      padding: 16px 20px;
      text-decoration: none;
      color: #111;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      border-color: #d0d0d8;
    }

    .link-card:active {
      transform: translateY(0);
    }

    .link-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-text {
      flex: 1;
    }

    .link-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #111;
      margin-bottom: 2px;
    }

    .link-desc {
      font-size: 0.78rem;
      color: #888;
    }

    .link-arrow {
      color: #bbb;
      flex-shrink: 0;
    }

    /* 各平台顏色 */
    .icon-fb    { background: #e7f0ff; }
    .icon-blog  { background: #fff3e0; }
    .icon-email { background: #e8f5e9; }

    /* 頁尾 */
    .footer {
      margin-top: 12px;
      font-size: 0.75rem;
      color: #bbb;
    }
  </style>
</head>
<body>

<div class="page">

  <div class="avatar">🐟</div>

  <div class="name">Markfish8672</div>
  <div class="bio">嗨！歡迎來到我的連結頁面<br>選一個方式跟我聯繫吧</div>

  <div class="links">

    <!-- Facebook -->
    <a class="link-card" href="https://www.facebook.com/zaixin.ni" target="_blank" rel="noopener">
      <div class="link-icon icon-fb">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#1877f2">
          <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.253h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
        </svg>
      </div>
      <div class="link-text">
        <div class="link-title">Facebook</div>
        <div class="link-desc">fb.com/zaixin.ni</div>
      </div>
      <svg class="link-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </a>

    <!-- Blog -->
    <a class="link-card" href="https://markfish8672.pixnet.net/blog" target="_blank" rel="noopener">
      <div class="link-icon icon-blog">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f57c00" stroke-width="1.8">
          <path d="M2 6h20M2 12h14M2 18h10"/>
          <circle cx="19" cy="17" r="3"/>
          <line x1="21.5" y1="19.5" x2="23" y2="21"/>
        </svg>
      </div>
      <div class="link-text">
        <div class="link-title">我的部落格</div>
        <div class="link-desc">markfish8672.pixnet.net</div>
      </div>
      <svg class="link-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </a>

    <!-- Email -->
    <a class="link-card" href="mailto:markfish8672@gmail.com">
      <div class="link-icon icon-email">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#34a853" stroke-width="1.8">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="2,4 12,13 22,4"/>
        </svg>
      </div>
      <div class="link-text">
        <div class="link-title">Email 聯絡</div>
        <div class="link-desc">markfish8672@gmail.com</div>
      </div>
      <svg class="link-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </a>

  </div>

  <div class="footer">© 2026 Markfish8672</div>

</div>

</body>
</html>
